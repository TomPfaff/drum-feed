<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>drum.feed</title>
<style>
  :root {
    --bg: #0d0d0f;
    --panel: #17171b;
    --text: #f2f2f4;
    --muted: #9a9aa3;
    --accent: #e8563f;
    --line: #26262c;
    --gap: 4px;
  }
  * { box-sizing: border-box; margin: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, "Segoe UI", Roboto, sans-serif;
    min-height: 100vh;
  }
  header {
    position: sticky; top: 0; z-index: 5;
    display: flex; align-items: baseline; gap: 10px;
    padding: 16px 20px;
    background: color-mix(in srgb, var(--bg) 88%, transparent);
    backdrop-filter: blur(8px);
    border-bottom: 1px solid var(--line);
  }
  header h1 { font-size: 20px; letter-spacing: 0.5px; }
  header h1 .dot { color: var(--accent); }
  header .count { color: var(--muted); font-size: 13px; flex: 1; }
  header .gear {
    background: none; border: 0; color: var(--muted);
    font-size: 17px; cursor: pointer;
  }
  header .gear:hover { color: var(--text); }

  #grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: var(--gap);
    max-width: 935px;
    margin: 0 auto;
    padding: var(--gap);
  }
  @media (min-width: 700px) { :root { --gap: 12px; } }

  .tile {
    position: relative;
    aspect-ratio: 1 / 1;
    overflow: hidden;
    cursor: pointer;
    background: var(--panel);
    border: 0; padding: 0;
    border-radius: 4px;
  }
  .tile img {
    width: 100%; height: 100%;
    object-fit: cover;
    display: block;
    transition: transform 0.25s ease;
  }
  .tile:hover img { transform: scale(1.04); }
  .tile .overlay {
    position: absolute; inset: 0;
    display: flex; flex-direction: column; justify-content: flex-end;
    padding: 10px;
    background: linear-gradient(transparent 55%, rgba(0,0,0,0.75));
    opacity: 0;
    transition: opacity 0.2s ease;
  }
  .tile:hover .overlay, .tile:focus .overlay { opacity: 1; }
  .tile .overlay .t { font-size: 13px; font-weight: 600; text-align: left; }
  .tile .overlay .d { font-size: 11px; color: #d0d0d6; text-align: left; }
  .tile-dots {
    position: absolute; top: 8px; left: 8px;
    display: flex; gap: 5px; align-items: center;
    pointer-events: none;
  }
  .tile-dots .dot {
    width: 12px; height: 12px; border-radius: 50%;
    box-shadow: 0 0 0 2px rgba(0,0,0,0.5);
  }
  .tile-dots .heart { color: var(--accent); font-size: 15px; line-height: 1; text-shadow: 0 0 5px rgba(0,0,0,0.9); }

  .tile.playing::after {
    content: "";
    position: absolute; top: 8px; right: 8px;
    width: 10px; height: 10px; border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 8px var(--accent);
  }

  #empty {
    text-align: center; color: var(--muted);
    padding: 80px 20px; font-size: 15px;
  }

  /* stats + calendar */
  #stats {
    max-width: 935px;
    margin: 16px auto 6px;
    padding: 0 12px;
  }
  .stat-row { display: flex; gap: 26px; flex-wrap: wrap; align-items: flex-end; }
  .stat b { font-size: 17px; font-weight: 700; }
  .stat span { display: block; color: var(--muted); font-size: 11.5px; margin-top: 1px; }
  #s-bar {
    height: 4px; border-radius: 2px;
    background: var(--line);
    margin-top: 12px;
    overflow: hidden;
  }
  #s-bar-fill {
    height: 100%; width: 0%;
    background: var(--accent);
    border-radius: 2px;
  }
  #cal-wrap {
    margin-top: 14px;
    overflow-x: auto;
    padding-bottom: 4px;
    scrollbar-width: thin;
  }
  #cal { display: flex; gap: 3px; width: max-content; }
  .cal-col { display: flex; flex-direction: column; gap: 3px; }
  .cal-mon {
    height: 12px; font-size: 9px; color: var(--muted);
    white-space: nowrap; overflow: visible;
  }
  .cal-cell {
    width: 10px; height: 10px;
    border-radius: 2px;
    background: #1e1e24;
  }
  .cal-cell.l1 { background: color-mix(in srgb, var(--accent) 35%, #1a1a1f); }
  .cal-cell.l2 { background: color-mix(in srgb, var(--accent) 65%, #1a1a1f); }
  .cal-cell.l3 { background: var(--accent); }

  /* detail view */
  #detail {
    position: fixed; inset: 0; z-index: 10;
    display: none;
    align-items: center; justify-content: center;
    background: rgba(0,0,0,0.82);
    padding: 20px;
  }
  #detail.open { display: flex; }
  #detail .card {
    background: var(--panel);
    border-radius: 12px;
    overflow: hidden;
    width: min(520px, 100%);
    max-height: 92vh;
    display: flex; flex-direction: column;
  }
  #detail img {
    width: 100%;
    max-height: 42vh;
    object-fit: contain;
    background: #000;
    flex-shrink: 0;
  }
  #detail .info { padding: 16px 18px 18px; overflow-y: auto; }
  #detail .info h2 { font-size: 17px; margin-bottom: 2px; }
  #detail .info .date { color: var(--muted); font-size: 13px; margin-bottom: 12px; }
  #detail audio { width: 100%; margin-top: 10px; }
  #detail .close {
    position: absolute; top: 14px; right: 18px;
    background: none; border: 0; color: #fff;
    font-size: 30px; line-height: 1; cursor: pointer;
  }

  /* filter bar */
  #filter {
    max-width: 935px;
    margin: 12px auto 2px;
    padding: 0 12px;
    display: flex; align-items: center; gap: 14px;
  }
  #f-search {
    flex: 1; min-width: 120px;
    background: var(--panel); color: var(--text);
    border: 1px solid var(--line); border-radius: 18px;
    padding: 8px 14px; font-size: 13.5px;
    outline: none;
  }
  #f-search:focus { border-color: var(--accent); }
  #f-like {
    background: none; border: 0; cursor: pointer;
    font-size: 20px; line-height: 1;
    color: #3a3a42;
  }
  #f-like.on { color: var(--accent); }
  .f-tags { display: flex; gap: 8px; }
  #no-match {
    text-align: center; color: var(--muted);
    padding: 40px 20px; font-size: 14px;
  }

  /* like + color tags */
  #react-row {
    display: flex; align-items: center; gap: 14px;
    margin: 2px 0 12px;
  }
  #r-like {
    background: none; border: 0; cursor: pointer;
    font-size: 22px; line-height: 1;
    color: #3a3a42;
    transition: transform 0.15s ease, color 0.15s ease;
  }
  #r-like.on { color: var(--accent); }
  #r-like:active { transform: scale(1.25); }
  #r-tags { display: flex; gap: 8px; }
  .tag {
    width: 18px; height: 18px;
    border-radius: 50%;
    border: 2px solid var(--tag-color);
    background: transparent;
    cursor: pointer;
    padding: 0;
    opacity: 0.55;
    transition: opacity 0.15s ease, background 0.15s ease;
  }
  .tag.on { background: var(--tag-color); opacity: 1; }
  .tag:hover { opacity: 1; }

  /* SoundCloud-style comment timeline */
  #timeline {
    position: relative;
    height: 34px;
    background: var(--line);
    border-radius: 6px;
    cursor: pointer;
    overflow: hidden;
  }
  #tl-played {
    position: absolute; left: 0; top: 0; bottom: 0;
    width: 0%;
    background: linear-gradient(90deg, color-mix(in srgb, var(--accent) 55%, #000), var(--accent));
    pointer-events: none;
  }
  .marker {
    position: absolute; bottom: 3px;
    width: 9px; height: 9px;
    margin-left: -4.5px;
    border-radius: 50%;
    background: #fff;
    border: 2px solid var(--panel);
    pointer-events: none;
  }

  /* comments */
  #c-list { margin-top: 14px; display: flex; flex-direction: column; gap: 8px; }
  .comment {
    display: flex; gap: 10px; align-items: baseline;
    font-size: 13.5px;
    padding: 7px 10px;
    border-radius: 8px;
    background: #1e1e24;
    cursor: pointer;
    border: 1px solid transparent;
  }
  .comment:hover { border-color: #35353d; }
  .comment.active { border-color: var(--accent); }
  .comment .ct {
    color: var(--accent); font-weight: 600;
    font-variant-numeric: tabular-nums;
    flex-shrink: 0;
  }
  .comment .cx { flex: 1; overflow-wrap: anywhere; }
  .comment .cd { color: var(--muted); font-size: 11px; flex-shrink: 0; }
  .comment .del {
    background: none; border: 0; color: var(--muted);
    cursor: pointer; font-size: 13px; padding: 0 2px;
    visibility: hidden;
  }
  .comment:hover .del { visibility: visible; }

  #c-form { display: flex; gap: 8px; margin-top: 12px; align-items: center; }
  #c-at {
    color: var(--accent); font-size: 12.5px; font-weight: 600;
    font-variant-numeric: tabular-nums; white-space: nowrap;
  }
  #c-input {
    flex: 1;
    background: #1e1e24; color: var(--text);
    border: 1px solid #35353d; border-radius: 18px;
    padding: 8px 14px; font-size: 13.5px;
    outline: none;
  }
  #c-input:focus { border-color: var(--accent); }
  #c-form button[type=submit] {
    background: var(--accent); color: #fff;
    border: 0; border-radius: 18px;
    padding: 8px 16px; font-size: 13.5px; font-weight: 600;
    cursor: pointer;
  }
  #sync-note { color: var(--muted); font-size: 11.5px; margin-top: 8px; }
</style>
</head>
<body>
<header>
  <h1>drum<span class="dot">.</span>feed</h1>
  <span class="count" id="count"></span>
  <button class="gear" id="gear" title="Kommentar-Sync einrichten (GitHub)">&#9881;</button>
</header>

<section id="stats" hidden>
  <div class="stat-row">
    <div class="stat"><b id="s-count"></b><span>Sessions</span></div>
    <div class="stat"><b id="s-time"></b><span>Spielzeit</span></div>
    <div class="stat"><b id="s-used"></b><span>belegt</span></div>
    <div class="stat"><b id="s-free"></b><span>frei von 1 GB</span></div>
  </div>
  <div id="s-bar"><div id="s-bar-fill"></div></div>
  <div id="cal-wrap"><div id="cal"></div></div>
</section>

<div id="filter" hidden>
  <input id="f-search" type="search" placeholder="Artist oder Song suchen..." autocomplete="off">
  <button id="f-like" title="Nur Likes zeigen">&#9829;</button>
  <div class="f-tags">
    <button class="tag" data-tag="red"    style="--tag-color:#e5484d" title="Nur rot"></button>
    <button class="tag" data-tag="yellow" style="--tag-color:#f5d90a" title="Nur gelb"></button>
    <button class="tag" data-tag="green"  style="--tag-color:#46a758" title="Nur grün"></button>
    <button class="tag" data-tag="blue"   style="--tag-color:#3e63dd" title="Nur blau"></button>
  </div>
</div>

<div id="grid"></div>
<div id="no-match" hidden>Keine Treffer — Filter anpassen.</div>
<div id="empty" hidden>Noch keine Sessions — publish_website.py starten!</div>

<div id="detail">
  <button class="close" aria-label="Schliessen">&times;</button>
  <div class="card">
    <img id="d-pic" alt="">
    <div class="info">
      <h2 id="d-title"></h2>
      <div class="date" id="d-date"></div>
      <div id="react-row">
        <button id="r-like" title="Gefällt mir">&#9829;</button>
        <div id="r-tags">
          <button class="tag" data-tag="red"    style="--tag-color:#e5484d" title="Tag: rot"></button>
          <button class="tag" data-tag="yellow" style="--tag-color:#f5d90a" title="Tag: gelb"></button>
          <button class="tag" data-tag="green"  style="--tag-color:#46a758" title="Tag: grün"></button>
          <button class="tag" data-tag="blue"   style="--tag-color:#3e63dd" title="Tag: blau"></button>
        </div>
      </div>
      <div id="timeline"><div id="tl-played"></div></div>
      <audio id="d-audio" controls preload="metadata"></audio>
      <div id="c-list"></div>
      <form id="c-form">
        <span id="c-at">0:00</span>
        <input id="c-input" placeholder="Kommentar an dieser Stelle..." autocomplete="off">
        <button type="submit">&#10148;</button>
      </form>
      <div id="sync-note"></div>
    </div>
  </div>
</div>

<script>
const $ = id => document.getElementById(id);
const grid = $("grid"), detail = $("detail"), audio = $("d-audio"), timeline = $("timeline");

// ---------- state ----------
// published comments come from comments.json (committed to the repo);
// new ones are kept in localStorage AND pushed to GitHub when sync is set up.
const state = {
  sessions: [],
  published: {},                                                    // from comments.json
  local: JSON.parse(localStorage.getItem("df_comments") || "{}"),   // written on this device
  reactionsPub: {},                                                 // from reactions.json
  reactionsLocal: JSON.parse(localStorage.getItem("df_reactions") || "{}"),
  tiles: {},                                                        // session id -> tile element
  current: null,                                                    // session shown in detail
};

function ghConfig() { return JSON.parse(localStorage.getItem("df_github") || "null"); }

function commentsFor(id) {
  const published = state.published[id] || [];
  const extra = (state.local[id] || []).filter(c => !published.some(p => p.id === c.id));
  return [...published, ...extra].sort((a, b) => a.t - b.t);
}

function allMerged() {
  const merged = {};
  const ids = new Set([...Object.keys(state.published), ...Object.keys(state.local)]);
  for (const id of ids) merged[id] = commentsFor(id);
  return merged;
}

// ---------- helpers ----------
function fmtDate(iso) { const [y, m, d] = iso.split("-"); return `${d}.${m}.${y}`; }
function fmtTime(s) {
  s = Math.max(0, Math.floor(s));
  return `${Math.floor(s / 60)}:${String(s % 60).padStart(2, "0")}`;
}

// ---------- sync (GitHub Contents API, used for comments + reactions) ----------
async function pushJsonToGitHub(filename, data) {
  const cfg = ghConfig();
  if (!cfg) return;
  $("sync-note").textContent = "Synchronisiere...";
  try {
    const api = `https://api.github.com/repos/${cfg.repo}/contents/${filename}`;
    const headers = { Authorization: `Bearer ${cfg.token}`, Accept: "application/vnd.github+json" };
    const existing = await fetch(api, { headers, cache: "no-store" });
    const sha = existing.ok ? (await existing.json()).sha : undefined;
    const content = btoa(unescape(encodeURIComponent(JSON.stringify(data, null, 2) + "\n")));
    const put = await fetch(api, {
      method: "PUT", headers,
      body: JSON.stringify({ message: "drum.feed: " + filename.replace(".json", ""), content, sha }),
    });
    if (!put.ok) throw new Error((await put.json()).message || put.status);
    $("sync-note").textContent = "Gespeichert (GitHub).";
  } catch (err) {
    $("sync-note").textContent = "Sync fehlgeschlagen: " + err.message + " — lokal gespeichert.";
  }
}

$("gear").addEventListener("click", () => {
  const cfg = ghConfig() || { repo: "", token: "" };
  const repo = prompt("GitHub Repo (Form: benutzer/repo):", cfg.repo);
  if (repo === null) return;
  const token = prompt("Fine-grained Token (nur Contents read/write fuer dieses Repo):", cfg.token);
  if (token === null) return;
  if (repo && token) {
    localStorage.setItem("df_github", JSON.stringify({ repo: repo.trim(), token: token.trim() }));
    alert("Sync eingerichtet! Kommentare werden ab jetzt ins Repo geschrieben.");
  } else {
    localStorage.removeItem("df_github");
    alert("Sync entfernt - Kommentare bleiben nur auf diesem Geraet.");
  }
});

// ---------- likes + color tags ----------
const TAG_COLORS = { red: "#e5484d", yellow: "#f5d90a", green: "#46a758", blue: "#3e63dd" };

function reactionsFor(id) {
  // local (this device) overrides published (repo) per session
  return { liked: false, tags: [], ...(state.reactionsPub[id] || {}), ...(state.reactionsLocal[id] || {}) };
}

function mergedReactions() {
  const merged = {};
  const ids = new Set([...Object.keys(state.reactionsPub), ...Object.keys(state.reactionsLocal)]);
  for (const id of ids) {
    const r = reactionsFor(id);
    if (r.liked || r.tags.length) merged[id] = r;
  }
  return merged;
}

function renderReactions() {
  if (!state.current) return;
  const r = reactionsFor(state.current.id);
  $("r-like").classList.toggle("on", !!r.liked);
  document.querySelectorAll("#r-tags .tag").forEach(button =>
    button.classList.toggle("on", r.tags.includes(button.dataset.tag)));
}

function renderTileDots(tile, id) {
  tile.querySelector(".tile-dots")?.remove();
  const r = reactionsFor(id);
  if (!r.liked && !r.tags.length) return;
  const dots = document.createElement("div");
  dots.className = "tile-dots";
  if (r.liked) {
    const heart = document.createElement("span");
    heart.className = "heart";
    heart.textContent = "♥";
    dots.appendChild(heart);
  }
  for (const tag of r.tags) {
    const dot = document.createElement("span");
    dot.className = "dot";
    dot.style.background = TAG_COLORS[tag];
    dots.appendChild(dot);
  }
  tile.appendChild(dots);
}

function setReaction(id, patch) {
  state.reactionsLocal[id] = { ...reactionsFor(id), ...patch };
  localStorage.setItem("df_reactions", JSON.stringify(state.reactionsLocal));
  renderReactions();
  applyFilter();  // refreshes tile dots and any active like/tag filter
  if (ghConfig()) pushJsonToGitHub("reactions.json", mergedReactions());
  else $("sync-note").textContent = "Nur auf diesem Geraet gespeichert - Sync via ⚙ einrichten.";
}

$("r-like").addEventListener("click", () => {
  if (!state.current) return;
  setReaction(state.current.id, { liked: !reactionsFor(state.current.id).liked });
});

document.querySelectorAll("#r-tags .tag").forEach(button => {
  button.addEventListener("click", () => {
    if (!state.current) return;
    const tags = reactionsFor(state.current.id).tags;
    const tag = button.dataset.tag;
    setReaction(state.current.id, {
      tags: tags.includes(tag) ? tags.filter(t => t !== tag) : [...tags, tag],
    });
  });
});

// ---------- comment UI ----------
function renderMarkers() {
  timeline.querySelectorAll(".marker").forEach(m => m.remove());
  if (!audio.duration || !state.current) return;
  for (const c of commentsFor(state.current.id)) {
    const m = document.createElement("div");
    m.className = "marker";
    m.style.left = (c.t / audio.duration * 100) + "%";
    timeline.appendChild(m);
  }
}

function renderComments() {
  const list = $("c-list");
  list.innerHTML = "";
  if (!state.current) return;
  for (const c of commentsFor(state.current.id)) {
    const row = document.createElement("div");
    row.className = "comment";
    row.dataset.t = c.t;
    row.innerHTML = `<span class="ct"></span><span class="cx"></span><span class="cd"></span><button class="del" title="Loeschen">&times;</button>`;
    row.querySelector(".ct").textContent = fmtTime(c.t);
    row.querySelector(".cx").textContent = c.text;
    row.querySelector(".cd").textContent = fmtDate(c.date);
    row.addEventListener("click", () => { audio.currentTime = c.t; audio.play().catch(() => {}); });
    row.querySelector(".del").addEventListener("click", (e) => {
      e.stopPropagation();
      if (!confirm("Kommentar loeschen?")) return;
      const id = state.current.id;
      state.published[id] = (state.published[id] || []).filter(x => x.id !== c.id);
      state.local[id] = (state.local[id] || []).filter(x => x.id !== c.id);
      localStorage.setItem("df_comments", JSON.stringify(state.local));
      renderComments(); renderMarkers();
      pushJsonToGitHub("comments.json", allMerged());
    });
    list.appendChild(row);
  }
}

$("c-form").addEventListener("submit", (e) => {
  e.preventDefault();
  const text = $("c-input").value.trim();
  if (!text || !state.current) return;
  const id = state.current.id;
  (state.local[id] ??= []).push({
    id: Date.now(),
    t: Math.round(audio.currentTime * 10) / 10,
    text,
    date: new Date().toISOString().slice(0, 10),
  });
  localStorage.setItem("df_comments", JSON.stringify(state.local));
  $("c-input").value = "";
  renderComments(); renderMarkers();
  if (ghConfig()) pushJsonToGitHub("comments.json", allMerged());
  else $("sync-note").textContent = "Nur auf diesem Geraet gespeichert - Sync via ⚙ einrichten.";
});

// ---------- timeline ----------
timeline.addEventListener("click", (e) => {
  if (!audio.duration) return;
  const rect = timeline.getBoundingClientRect();
  audio.currentTime = (e.clientX - rect.left) / rect.width * audio.duration;
  audio.play().catch(() => {});
});
audio.addEventListener("timeupdate", () => {
  if (audio.duration) $("tl-played").style.width = (audio.currentTime / audio.duration * 100) + "%";
  $("c-at").textContent = fmtTime(audio.currentTime);
  // highlight the comment the playhead is passing (SoundCloud style)
  document.querySelectorAll(".comment").forEach(row => {
    const t = parseFloat(row.dataset.t);
    row.classList.toggle("active", audio.currentTime >= t && audio.currentTime < t + 4);
  });
});
audio.addEventListener("loadedmetadata", renderMarkers);

// ---------- stats + calendar ----------
function fmtHours(totalSeconds) {
  const h = Math.floor(totalSeconds / 3600), m = Math.round((totalSeconds % 3600) / 60);
  return h ? `${h} Std ${m} Min` : `${m} Min`;
}
function fmtSize(bytes) {
  const mb = bytes / 1048576;
  if (mb < 1) return (bytes / 1024).toFixed(0) + " KB";
  if (mb < 1024) return mb.toFixed(1) + " MB";
  return (mb / 1024).toFixed(2) + " GB";
}

function renderStats(sessions) {
  $("stats").hidden = false;
  const LIMIT = 1024 * 1048576;  // GitHub Pages: 1 GB
  const totalSize = sessions.reduce((a, s) => a + (s.size || 0), 0);
  const totalDur = sessions.reduce((a, s) => a + (s.duration || 0), 0);
  $("s-count").textContent = sessions.length;
  $("s-time").textContent = fmtHours(totalDur);
  $("s-used").textContent = fmtSize(totalSize);
  $("s-free").textContent = fmtSize(LIMIT - totalSize);
  $("s-bar-fill").style.width = Math.max(0.4, totalSize / LIMIT * 100) + "%";
  renderCalendar(sessions);
}

// GitHub-style contribution heatmap: 52 weeks, columns = weeks, rows = Mon-Sun
function renderCalendar(sessions) {
  const counts = {};
  sessions.forEach(s => { counts[s.date] = (counts[s.date] || 0) + 1; });
  const cal = $("cal");
  cal.innerHTML = "";
  const months = ["Jan", "Feb", "Mär", "Apr", "Mai", "Jun", "Jul", "Aug", "Sep", "Okt", "Nov", "Dez"];
  const today = new Date(); today.setHours(0, 0, 0, 0);
  const start = new Date(today);
  start.setDate(start.getDate() - 364);
  start.setDate(start.getDate() - ((start.getDay() + 6) % 7));  // back to Monday
  let prevMonth = -1;
  for (const week = new Date(start); week <= today; week.setDate(week.getDate() + 7)) {
    const col = document.createElement("div");
    col.className = "cal-col";
    const label = document.createElement("div");
    label.className = "cal-mon";
    if (week.getMonth() !== prevMonth) {
      label.textContent = months[week.getMonth()];
      prevMonth = week.getMonth();
    }
    col.appendChild(label);
    for (let d = 0; d < 7; d++) {
      const dt = new Date(week);
      dt.setDate(week.getDate() + d);
      const cell = document.createElement("div");
      cell.className = "cal-cell";
      if (dt <= today) {
        const iso = `${dt.getFullYear()}-${String(dt.getMonth() + 1).padStart(2, "0")}-${String(dt.getDate()).padStart(2, "0")}`;
        const n = counts[iso] || 0;
        if (n) cell.classList.add("l" + Math.min(n, 3));
        cell.title = `${fmtDate(iso)}: ${n} Session${n === 1 ? "" : "s"}`;
      } else {
        cell.style.visibility = "hidden";
      }
      col.appendChild(cell);
    }
    cal.appendChild(col);
  }
  const wrap = $("cal-wrap");
  wrap.scrollLeft = wrap.scrollWidth;  // most recent weeks in view
}

// ---------- detail view ----------
function openDetail(session, tile) {
  state.current = session;
  $("d-pic").src = session.picture;
  $("d-title").textContent = session.song || session.title;
  $("d-date").textContent = (session.artist ? session.artist + " · " : "") + fmtDate(session.date);
  renderReactions();
  $("tl-played").style.width = "0%";
  $("c-at").textContent = "0:00";
  $("sync-note").textContent = ghConfig() ? "" : "Kommentare: nur dieses Geraet (Sync via ⚙).";
  audio.src = session.audio;
  renderComments(); renderMarkers();
  detail.classList.add("open");
  audio.play().catch(() => {});
  document.querySelectorAll(".tile").forEach(t => t.classList.remove("playing"));
  tile.classList.add("playing");
}

function closeDetail() {
  detail.classList.remove("open");
  audio.pause();
  state.current = null;
  document.querySelectorAll(".tile").forEach(t => t.classList.remove("playing"));
}

detail.addEventListener("click", (e) => {
  if (e.target === detail || e.target.classList.contains("close")) closeDetail();
});
document.addEventListener("keydown", (e) => {
  if (e.key === "Escape" && detail.classList.contains("open")) closeDetail();
});

// ---------- grid + filter ----------
const filter = { q: "", tags: [], liked: false };

function renderGrid(list) {
  grid.innerHTML = "";
  state.tiles = {};
  $("no-match").hidden = list.length > 0;
  for (const session of list) {
    const tile = document.createElement("button");
    tile.className = "tile";
    tile.innerHTML = `
      <img src="${session.picture}" alt="" decoding="async">
      <div class="overlay">
        <div class="t"></div>
        <div class="d"></div>
      </div>`;
    tile.querySelector(".t").textContent = session.song || session.title;
    tile.querySelector(".d").textContent =
      (session.artist ? session.artist + " · " : "") + fmtDate(session.date);
    tile.addEventListener("click", () => openDetail(session, tile));
    if (state.current && session.id === state.current.id) tile.classList.add("playing");
    state.tiles[session.id] = tile;
    renderTileDots(tile, session.id);
    grid.appendChild(tile);
  }
}

function applyFilter() {
  const query = filter.q.toLowerCase();
  const filtered = state.sessions.filter(session => {
    const haystack = `${session.artist || ""} ${session.song || ""} ${session.title || ""}`.toLowerCase();
    if (query && !haystack.includes(query)) return false;
    const r = reactionsFor(session.id);
    if (filter.liked && !r.liked) return false;
    if (filter.tags.length && !filter.tags.some(tag => r.tags.includes(tag))) return false;
    return true;
  });
  renderGrid(filtered);
  $("count").textContent = filtered.length === state.sessions.length
    ? `${state.sessions.length} Sessions`
    : `${filtered.length} von ${state.sessions.length} Sessions`;
}

$("f-search").addEventListener("input", (e) => {
  filter.q = e.target.value.trim();
  applyFilter();
});
$("f-like").addEventListener("click", () => {
  filter.liked = !filter.liked;
  $("f-like").classList.toggle("on", filter.liked);
  applyFilter();
});
document.querySelectorAll("#filter .f-tags .tag").forEach(button => {
  button.addEventListener("click", () => {
    const tag = button.dataset.tag;
    filter.tags = filter.tags.includes(tag)
      ? filter.tags.filter(t => t !== tag)
      : [...filter.tags, tag];
    button.classList.toggle("on", filter.tags.includes(tag));
    applyFilter();
  });
});

// ---------- load feed ----------
Promise.all([
  fetch("sessions.json?" + Date.now()).then(r => r.json()),
  fetch("comments.json?" + Date.now()).then(r => r.ok ? r.json() : {}).catch(() => ({})),
  fetch("reactions.json?" + Date.now()).then(r => r.ok ? r.json() : {}).catch(() => ({})),
]).then(([sessions, published, reactionsPub]) => {
  state.sessions = sessions;
  state.published = published;
  state.reactionsPub = reactionsPub;
  sessions.sort((a, b) => b.date.localeCompare(a.date));
  if (!sessions.length) { $("empty").hidden = false; return; }
  renderStats(sessions);
  $("filter").hidden = false;
  applyFilter();
}).catch(() => { $("empty").hidden = false; });
</script>
